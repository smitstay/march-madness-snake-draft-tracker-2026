server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # NCAA API proxy with CORS headers
    location /api/ncaa/ {
        proxy_pass https://ncaa-api.henrygd.me/;
        proxy_ssl_server_name on;
        proxy_set_header Host ncaa-api.henrygd.me;
        proxy_set_header Accept application/json;

        # CORS — only allow our domains
        set $cors_origin "";
        if ($http_origin = "https://ncaa.taytech.io") {
            set $cors_origin $http_origin;
        }
        if ($http_origin = "https://smitstay.github.io") {
            set $cors_origin $http_origin;
        }

        proxy_hide_header Access-Control-Allow-Origin;
        add_header Access-Control-Allow-Origin $cors_origin always;
        add_header Access-Control-Allow-Methods "GET, OPTIONS" always;
        add_header Access-Control-Allow-Headers "*" always;

        # Handle preflight
        if ($request_method = OPTIONS) {
            add_header Access-Control-Allow-Origin $cors_origin;
            add_header Access-Control-Allow-Methods "GET, OPTIONS";
            add_header Access-Control-Allow-Headers "*";
            add_header Content-Length 0;
            add_header Content-Type text/plain;
            return 204;
        }
    }

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
